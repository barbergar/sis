<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja — Barbería Garage</title>
<style>
  :root{
    --fondo:#121212;
    --panel:#1c1c1c;
    --borde:#2c2c2c;
    --texto:#eaeaea;
    --texto-suave:#9a9a9a;
    --ambar:#e8a33d;
    --verde:#4caf50;
    --rojo:#e05c5c;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--fondo);
    color:var(--texto);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height:100vh;
  }

  /* ===== PANTALLA DE LOGIN ===== */
  #pantallaLogin{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .cajaLogin{
    background:var(--panel);
    border:1px solid var(--borde);
    border-radius:14px;
    padding:32px 24px;
    width:100%;
    max-width:360px;
    text-align:center;
  }
  .cajaLogin h1{
    font-size:22px;
    margin-bottom:4px;
  }
  .cajaLogin h1 span{ color:var(--ambar); }
  .cajaLogin p{
    color:var(--texto-suave);
    font-size:14px;
    margin-bottom:24px;
  }
  .cajaLogin input{
    width:100%;
    padding:14px;
    font-size:16px;
    border-radius:10px;
    border:1px solid var(--borde);
    background:var(--fondo);
    color:var(--texto);
    text-align:center;
    margin-bottom:12px;
  }
  .cajaLogin input:focus{
    outline:none;
    border-color:var(--ambar);
  }
  .cajaLogin button{
    width:100%;
    padding:14px;
    font-size:16px;
    font-weight:600;
    border:none;
    border-radius:10px;
    background:var(--ambar);
    color:#121212;
    cursor:pointer;
  }
  #msgLogin{
    color:var(--rojo);
    font-size:14px;
    margin-top:10px;
    min-height:18px;
  }

  /* ===== PANTALLA PRINCIPAL ===== */
  #pantallaCaja{ display:none; }
  header{
    background:var(--panel);
    border-bottom:1px solid var(--borde);
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  header h2{ font-size:18px; }
  header h2 span{ color:var(--ambar); }
  .ladoDerecho{
    display:flex;
    align-items:center;
    gap:12px;
  }
  #btnSalir{
    background:none;
    border:1px solid var(--borde);
    color:var(--texto-suave);
    padding:8px 14px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
  }
  main{
    padding:20px 16px;
    max-width:600px;
    margin:0 auto;
  }
  .aviso{
    background:var(--panel);
    border:1px dashed var(--borde);
    border-radius:12px;
    padding:24px;
    text-align:center;
    color:var(--texto-suave);
    font-size:15px;
  }

  /* ===== INDICADOR DE FIREBASE ===== */
  #estadoFirebase{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--texto-suave);
  }
  #puntoFirebase{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#777; /* gris = conectando */
  }
  #puntoFirebase.ok{ background:var(--verde); }
  #puntoFirebase.error{ background:var(--rojo); }

  #detalleError{
    display:none;
    margin-top:16px;
    background:#2a1a1a;
    border:1px solid #5c3030;
    border-radius:10px;
    padding:14px;
    font-size:13px;
    color:#e0a0a0;
    word-break:break-word;
  }
</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="pantallaLogin">
  <div class="cajaLogin">
    <h1>Barbería <span>Garage</span></h1>
    <p>Panel de caja</p>
    <input type="password" id="inputPass" placeholder="Contraseña" autocomplete="off">
    <button id="btnEntrar">Entrar</button>
    <div id="msgLogin"></div>
  </div>
</div>

<!-- PANTALLA PRINCIPAL -->
<div id="pantallaCaja">
  <header>
    <h2>Caja — <span>Garage</span></h2>
    <div class="ladoDerecho">
      <div id="estadoFirebase">
        <div id="puntoFirebase"></div>
        <span id="textoFirebase">Conectando...</span>
      </div>
      <button id="btnSalir">Salir</button>
    </div>
  </header>
  <main>
    <div class="aviso">
      Sesión iniciada correctamente.<br>
      Aquí irán los tickets, cobros y el resumen del día (próximas capas).
    </div>
    <div id="detalleError"></div>
  </main>
</div>

<!-- ===== FIREBASE (versión modular por CDN) ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ----- Configuración del proyecto "agend" -----
  const firebaseConfig = {
    apiKey: "AIzaSyCPJ_Sp727Gsq0qholS8466L2xoF6ju6Qs",
    authDomain: "agend-1d0e5.firebaseapp.com",
    projectId: "agend-1d0e5",
    appId: "1:536059431228:web:f7a186659845111e09b639"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // Guardamos la conexión para usarla en próximas capas
  window.db = db;

  // ----- Prueba de conexión: intentar leer la colección "ajustes" -----
  const punto  = document.getElementById("puntoFirebase");
  const texto  = document.getElementById("textoFirebase");
  const detalle = document.getElementById("detalleError");

  async function probarConexion(){
    try{
      await getDocs(collection(db, "ajustes"));
      // Si llega aquí, la conexión funciona (aunque la colección esté vacía)
      punto.classList.add("ok");
      texto.textContent = "Firebase conectado";
    } catch(err){
      punto.classList.add("error");
      texto.textContent = "Error de conexión";
      detalle.style.display = "block";
      detalle.textContent = "Detalle del error: " + err.message;
    }
  }

  probarConexion();
</script>

<!-- ===== LOGIN Y SESIÓN ===== -->
<script>
  const PASS_CAJA = "peluqueriacochera1720";
  const CLAVE_SESION = "garageSesion";
  const DURACION_SESION = 5 * 60 * 60 * 1000; // 5 horas

  const pantallaLogin = document.getElementById("pantallaLogin");
  const pantallaCaja  = document.getElementById("pantallaCaja");
  const inputPass     = document.getElementById("inputPass");
  const btnEntrar     = document.getElementById("btnEntrar");
  const btnSalir      = document.getElementById("btnSalir");
  const msgLogin      = document.getElementById("msgLogin");

  function sesionValida(){
    const guardado = localStorage.getItem(CLAVE_SESION);
    if(!guardado) return false;
    const inicio = parseInt(guardado, 10);
    if(isNaN(inicio)) return false;
    return (Date.now() - inicio) < DURACION_SESION;
  }

  function mostrarCaja(){
    pantallaLogin.style.display = "none";
    pantallaCaja.style.display  = "block";
  }

  function mostrarLogin(){
    pantallaCaja.style.display  = "none";
    pantallaLogin.style.display = "flex";
    inputPass.value = "";
    msgLogin.textContent = "";
  }

  function intentarEntrar(){
    if(inputPass.value === PASS_CAJA){
      localStorage.setItem(CLAVE_SESION, Date.now().toString());
      mostrarCaja();
    } else {
      msgLogin.textContent = "Contraseña incorrecta";
      inputPass.value = "";
    }
  }

  btnEntrar.addEventListener("click", intentarEntrar);
  inputPass.addEventListener("keydown", function(e){
    if(e.key === "Enter") intentarEntrar();
  });

  btnSalir.addEventListener("click", function(){
    localStorage.removeItem(CLAVE_SESION);
    mostrarLogin();
  });

  if(sesionValida()){
    mostrarCaja();
  }
</script>

</body>
</html>
