<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja — Barbería Garage</title>
<style>
  :root{
    --fondo:#121212;
    --panel:#1c1c1c;
    --borde:#2c2c2c;
    --texto:#eaeaea;
    --texto-suave:#9a9a9a;
    --ambar:#e8a33d;
    --verde:#4caf50;
    --rojo:#e05c5c;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--fondo);
    color:var(--texto);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height:100vh;
  }
  button{ font-family:inherit; }

  /* ===== PANTALLA DE LOGIN ===== */
  #pantallaLogin{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .cajaLogin{
    background:var(--panel);
    border:1px solid var(--borde);
    border-radius:14px;
    padding:32px 24px;
    width:100%;
    max-width:360px;
    text-align:center;
  }
  .cajaLogin h1{ font-size:22px; margin-bottom:4px; }
  .cajaLogin h1 span{ color:var(--ambar); }
  .cajaLogin p{
    color:var(--texto-suave);
    font-size:14px;
    margin-bottom:24px;
  }
  .cajaLogin input{
    width:100%;
    padding:14px;
    font-size:16px;
    border-radius:10px;
    border:1px solid var(--borde);
    background:var(--fondo);
    color:var(--texto);
    text-align:center;
    margin-bottom:12px;
  }
  .cajaLogin input:focus{ outline:none; border-color:var(--ambar); }
  .cajaLogin button{
    width:100%;
    padding:14px;
    font-size:16px;
    font-weight:600;
    border:none;
    border-radius:10px;
    background:var(--ambar);
    color:#121212;
    cursor:pointer;
  }
  #msgLogin{
    color:var(--rojo);
    font-size:14px;
    margin-top:10px;
    min-height:18px;
  }

  /* ===== PANTALLA PRINCIPAL ===== */
  #pantallaCaja{ display:none; }
  header{
    background:var(--panel);
    border-bottom:1px solid var(--borde);
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:10;
  }
  header h2{ font-size:18px; }
  header h2 span{ color:var(--ambar); }
  .ladoDerecho{ display:flex; align-items:center; gap:12px; }
  #btnSalir{
    background:none;
    border:1px solid var(--borde);
    color:var(--texto-suave);
    padding:8px 14px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
  }
  main{
    padding:20px 16px 60px;
    max-width:600px;
    margin:0 auto;
  }

  /* ===== INDICADOR DE FIREBASE ===== */
  #estadoFirebase{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--texto-suave);
  }
  #puntoFirebase{
    width:10px; height:10px;
    border-radius:50%;
    background:#777;
  }
  #puntoFirebase.ok{ background:var(--verde); }
  #puntoFirebase.error{ background:var(--rojo); }

  #detalleError{
    display:none;
    margin-top:16px;
    background:#2a1a1a;
    border:1px solid #5c3030;
    border-radius:10px;
    padding:14px;
    font-size:13px;
    color:#e0a0a0;
    word-break:break-word;
  }

  /* ===== BOTONES PRINCIPALES ===== */
  #btnCobroManual{
    width:100%;
    padding:16px;
    font-size:17px;
    font-weight:600;
    border:none;
    border-radius:12px;
    background:var(--ambar);
    color:#121212;
    cursor:pointer;
    margin-bottom:14px;
  }
  #btnTicketPrueba{
    width:100%;
    padding:10px;
    font-size:13px;
    border:1px dashed var(--borde);
    border-radius:10px;
    background:none;
    color:var(--texto-suave);
    cursor:pointer;
    margin-bottom:24px;
  }

  /* ===== SECCIONES ===== */
  .tituloSeccion{
    font-size:15px;
    color:var(--texto-suave);
    margin:22px 0 10px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .tituloSeccion:first-of-type{ margin-top:0; }
  #totalDia{ color:var(--ambar); font-weight:700; font-size:17px; }
  #contadorPendientes{
    background:var(--ambar);
    color:#121212;
    font-weight:700;
    font-size:13px;
    padding:2px 10px;
    border-radius:20px;
    display:none;
  }

  #listaPendientes, #listaCobros{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  /* ===== TARJETA DE PENDIENTE ===== */
  .tarjetaPendiente{
    background:#241d10;
    border:1px solid #4a3a1c;
    border-radius:12px;
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .tarjetaPendiente .info{ flex:1; min-width:0; }
  .tarjetaPendiente .barbero{ font-weight:600; font-size:15px; }
  .tarjetaPendiente .servicios{
    color:#c9b48a;
    font-size:13px;
    margin-top:2px;
  }
  .tarjetaPendiente .hora{ color:var(--texto-suave); font-size:12px; margin-top:2px; }
  .tarjetaPendiente .monto{
    font-weight:700;
    font-size:16px;
    white-space:nowrap;
    color:var(--ambar);
  }
  .btnCobrarPend{
    padding:10px 16px;
    font-size:14px;
    font-weight:700;
    border:none;
    border-radius:10px;
    background:var(--ambar);
    color:#121212;
    cursor:pointer;
    white-space:nowrap;
  }

  /* ===== TARJETA DE COBRO ===== */
  .tarjetaCobro{
    background:var(--panel);
    border:1px solid var(--borde);
    border-radius:12px;
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .tarjetaCobro .info{ flex:1; min-width:0; }
  .tarjetaCobro .barbero{ font-weight:600; font-size:15px; }
  .tarjetaCobro .concepto{
    color:var(--texto-suave);
    font-size:13px;
    margin-top:2px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .tarjetaCobro .hora{ color:var(--texto-suave); font-size:12px; margin-top:2px; }
  .tarjetaCobro .monto{ font-weight:700; font-size:16px; white-space:nowrap; }
  .etiqueta{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:20px;
    margin-top:4px;
  }
  .etiqueta.efectivo{ background:#1e3320; color:#8fd694; }
  .etiqueta.tarjeta{ background:#1d2a3a; color:#8ab8e8; }
  .vacio{
    background:var(--panel);
    border:1px dashed var(--borde);
    border-radius:12px;
    padding:20px;
    text-align:center;
    color:var(--texto-suave);
    font-size:14px;
  }

  /* ===== MODALES ===== */
  .fondoModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    z-index:100;
    align-items:flex-end;
    justify-content:center;
  }
  .fondoModal.abierto{ display:flex; }
  .modal{
    background:var(--panel);
    border:1px solid var(--borde);
    border-radius:18px 18px 0 0;
    padding:22px 18px 28px;
    width:100%;
    max-width:600px;
  }
  @media(min-width:640px){
    .fondoModal{ align-items:center; }
    .modal{ border-radius:18px; }
  }
  .modal h3{ font-size:18px; margin-bottom:16px; }
  .modal label{
    display:block;
    font-size:13px;
    color:var(--texto-suave);
    margin:14px 0 6px;
  }
  .filaBarberos{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:8px;
  }
  .btnBarbero{
    padding:12px 0;
    font-size:15px;
    font-weight:600;
    border-radius:10px;
    border:1px solid var(--borde);
    background:var(--fondo);
    color:var(--texto);
    cursor:pointer;
  }
  .btnBarbero.activo{
    background:var(--ambar);
    color:#121212;
    border-color:var(--ambar);
  }
  .modal input{
    width:100%;
    padding:13px;
    font-size:16px;
    border-radius:10px;
    border:1px solid var(--borde);
    background:var(--fondo);
    color:var(--texto);
  }
  .modal input:focus{ outline:none; border-color:var(--ambar); }
  .filaMetodo{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:18px;
  }
  .btnMetodo{
    padding:15px 0;
    font-size:16px;
    font-weight:700;
    border:none;
    border-radius:12px;
    cursor:pointer;
  }
  .btnMetodo:disabled{ opacity:0.5; cursor:default; }
  .btnMetodo.efectivo{ background:#2e5c33; color:#d9f2db; }
  .btnMetodo.tarjeta{ background:#2b4a6b; color:#dbeafd; }
  .btnCancelarModal{
    width:100%;
    margin-top:12px;
    padding:12px;
    font-size:14px;
    background:none;
    border:1px solid var(--borde);
    color:var(--texto-suave);
    border-radius:10px;
    cursor:pointer;
  }
  .btnDescartar{
    width:100%;
    margin-top:10px;
    padding:12px;
    font-size:14px;
    background:none;
    border:1px solid #5c3030;
    color:var(--rojo);
    border-radius:10px;
    cursor:pointer;
  }
  .msgModal{
    color:var(--rojo);
    font-size:13px;
    margin-top:10px;
    min-height:16px;
    text-align:center;
  }
  .datosPendiente{
    background:var(--fondo);
    border:1px solid var(--borde);
    border-radius:12px;
    padding:14px;
  }
  .datosPendiente .barbero{ font-weight:700; font-size:16px; }
  .datosPendiente .servicios{
    color:var(--texto-suave);
    font-size:14px;
    margin-top:4px;
  }
</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="pantallaLogin">
  <div class="cajaLogin">
    <h1>Barbería <span>Garage</span></h1>
    <p>Panel de caja</p>
    <input type="password" id="inputPass" placeholder="Contraseña" autocomplete="off">
    <button id="btnEntrar">Entrar</button>
    <div id="msgLogin"></div>
  </div>
</div>

<!-- PANTALLA PRINCIPAL -->
<div id="pantallaCaja">
  <header>
    <h2>Caja — <span>Garage</span></h2>
    <div class="ladoDerecho">
      <div id="estadoFirebase">
        <div id="puntoFirebase"></div>
        <span id="textoFirebase">Conectando...</span>
      </div>
      <button id="btnSalir">Salir</button>
    </div>
  </header>
  <main>
    <button id="btnCobroManual">+ Cobro manual</button>
    <button id="btnTicketPrueba">🧪 Ticket de prueba (temporal, se quita cuando exista bg18)</button>

    <div class="tituloSeccion">
      <span>Tickets pendientes</span>
      <span id="contadorPendientes">0</span>
    </div>
    <div id="listaPendientes">
      <div class="vacio">No hay tickets pendientes.</div>
    </div>

    <div class="tituloSeccion">
      <span>Cobros de hoy</span>
      <span id="totalDia">$0</span>
    </div>
    <div id="listaCobros">
      <div class="vacio">Aún no hay cobros registrados hoy.</div>
    </div>

    <div id="detalleError"></div>
  </main>
</div>

<!-- MODAL DE COBRO MANUAL -->
<div class="fondoModal" id="modalCobro">
  <div class="modal">
    <h3>Cobro manual</h3>

    <label>Barbero</label>
    <div class="filaBarberos" id="filaBarberos">
      <button class="btnBarbero" data-num="1">1</button>
      <button class="btnBarbero" data-num="2">2</button>
      <button class="btnBarbero" data-num="3">3</button>
      <button class="btnBarbero" data-num="4">4</button>
      <button class="btnBarbero" data-num="5">5</button>
    </div>

    <label>Concepto (servicio)</label>
    <input type="text" id="inputConcepto" placeholder="Ej. Corte" autocomplete="off">

    <label>Monto ($)</label>
    <input type="number" id="inputMonto" placeholder="0" inputmode="numeric" min="0">

    <div class="filaMetodo">
      <button class="btnMetodo efectivo" id="btnEfectivo">Efectivo</button>
      <button class="btnMetodo tarjeta" id="btnTarjeta">Tarjeta</button>
    </div>
    <div class="msgModal" id="msgModal"></div>
    <button class="btnCancelarModal" id="btnCancelarCobro">Cancelar</button>
  </div>
</div>

<!-- MODAL DE COBRO DE TICKET PENDIENTE -->
<div class="fondoModal" id="modalPendiente">
  <div class="modal">
    <h3>Cobrar ticket</h3>

    <div class="datosPendiente">
      <div class="barbero" id="pendBarbero">Barbero</div>
      <div class="servicios" id="pendServicios">Servicios</div>
    </div>

    <label>Monto ($) — puedes ajustarlo</label>
    <input type="number" id="pendMonto" placeholder="0" inputmode="numeric" min="0">

    <div class="filaMetodo">
      <button class="btnMetodo efectivo" id="pendEfectivo">Efectivo</button>
      <button class="btnMetodo tarjeta" id="pendTarjeta">Tarjeta</button>
    </div>
    <div class="msgModal" id="pendMsg"></div>
    <button class="btnDescartar" id="pendDescartar">Descartar ticket</button>
    <button class="btnCancelarModal" id="pendCancelar">Cancelar</button>
  </div>
</div>

<!-- ===== FIREBASE + LÓGICA ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, getDocs, addDoc, doc,
    query, where, onSnapshot, serverTimestamp, writeBatch
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ----- Configuración del proyecto "agend" -----
  const firebaseConfig = {
    apiKey: "AIzaSyCPJ_Sp727Gsq0qholS8466L2xoF6ju6Qs",
    authDomain: "agend-1d0e5.firebaseapp.com",
    projectId: "agend-1d0e5",
    appId: "1:536059431228:web:f7a186659845111e09b639"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  window.db = db;

  // ----- Fecha de hoy AAAA-MM-DD (hora local) -----
  function fechaHoy(){
    const d = new Date();
    const a = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const dia = String(d.getDate()).padStart(2, "0");
    return a + "-" + m + "-" + dia;
  }

  // ----- Indicador de conexión -----
  const punto   = document.getElementById("puntoFirebase");
  const texto   = document.getElementById("textoFirebase");
  const detalle = document.getElementById("detalleError");

  function mostrarError(err){
    punto.classList.remove("ok");
    punto.classList.add("error");
    texto.textContent = "Error de conexión";
    detalle.style.display = "block";
    detalle.textContent = "Detalle del error: " + err.message;
  }

  try{
    await getDocs(collection(db, "ajustes"));
    punto.classList.add("ok");
    texto.textContent = "Firebase conectado";
  } catch(err){
    mostrarError(err);
  }

  // ----- Utilidades -----
  function formatoDinero(n){
    return "$" + n.toLocaleString("es-MX");
  }

  function formatoHora(ts){
    if(!ts) return "";
    const d = ts.toDate();
    let h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, "0");
    const ampm = h >= 12 ? "p.m." : "a.m.";
    h = h % 12; if(h === 0) h = 12;
    return h + ":" + m + " " + ampm;
  }

  // ============================================================
  // COBRO MANUAL (igual que la capa anterior)
  // ============================================================
  const modalCobro    = document.getElementById("modalCobro");
  const btnCobro      = document.getElementById("btnCobroManual");
  const btnCancelar   = document.getElementById("btnCancelarCobro");
  const filaBarberos  = document.getElementById("filaBarberos");
  const inputConcepto = document.getElementById("inputConcepto");
  const inputMonto    = document.getElementById("inputMonto");
  const btnEfectivo   = document.getElementById("btnEfectivo");
  const btnTarjeta    = document.getElementById("btnTarjeta");
  const msgModal      = document.getElementById("msgModal");

  let barberoElegido = null;
  let guardando = false;

  function abrirModalCobro(){
    barberoElegido = null;
    inputConcepto.value = "";
    inputMonto.value = "";
    msgModal.textContent = "";
    document.querySelectorAll(".btnBarbero").forEach(function(b){
      b.classList.remove("activo");
    });
    modalCobro.classList.add("abierto");
  }

  btnCobro.addEventListener("click", abrirModalCobro);
  btnCancelar.addEventListener("click", function(){
    modalCobro.classList.remove("abierto");
  });

  filaBarberos.addEventListener("click", function(e){
    const btn = e.target.closest(".btnBarbero");
    if(!btn) return;
    document.querySelectorAll(".btnBarbero").forEach(function(b){
      b.classList.remove("activo");
    });
    btn.classList.add("activo");
    barberoElegido = parseInt(btn.dataset.num, 10);
  });

  async function guardarCobroManual(metodo){
    if(guardando) return;
    const monto = parseFloat(inputMonto.value);

    if(barberoElegido === null){
      msgModal.style.color = "#e05c5c";
      msgModal.textContent = "Elige un barbero";
      return;
    }
    if(isNaN(monto) || monto <= 0){
      msgModal.style.color = "#e05c5c";
      msgModal.textContent = "Escribe un monto válido";
      return;
    }

    guardando = true;
    btnEfectivo.disabled = true;
    btnTarjeta.disabled = true;
    msgModal.style.color = "#9a9a9a";
    msgModal.textContent = "Guardando...";

    try{
      await addDoc(collection(db, "tickets"), {
        barbero: barberoElegido,
        concepto: inputConcepto.value.trim() || "Cobro manual",
        monto: monto,
        metodo: metodo,
        fecha: fechaHoy(),
        origen: "manual",
        creado: serverTimestamp()
      });
      modalCobro.classList.remove("abierto");
    } catch(err){
      msgModal.style.color = "#e05c5c";
      msgModal.textContent = "Error al guardar: " + err.message;
    }

    guardando = false;
    btnEfectivo.disabled = false;
    btnTarjeta.disabled = false;
  }

  btnEfectivo.addEventListener("click", function(){ guardarCobroManual("efectivo"); });
  btnTarjeta.addEventListener("click", function(){ guardarCobroManual("tarjeta"); });

  // ============================================================
  // BOTÓN TEMPORAL: CREAR TICKET DE PRUEBA
  // (simula lo que hará bg18.html — se quita en esa capa)
  // ============================================================
  const btnPrueba = document.getElementById("btnTicketPrueba");
  const ejemplos = [
    { barbero: 1, servicios: ["Corte VIP", "Arreglo barba VIP"], monto: 400 },
    { barbero: 2, servicios: ["Corte"], monto: 150 },
    { barbero: 3, servicios: ["Paquete Papi Chulo"], monto: 330 },
    { barbero: 4, servicios: ["Corte", "Limpieza cejas"], monto: 200 },
    { barbero: 5, servicios: ["Paquete Rey"], monto: 570 }
  ];

  btnPrueba.addEventListener("click", async function(){
    btnPrueba.disabled = true;
    const ej = ejemplos[Math.floor(Math.random() * ejemplos.length)];
    try{
      await addDoc(collection(db, "pendientes"), {
        barbero: ej.barbero,
        servicios: ej.servicios,
        monto: ej.monto,
        fecha: fechaHoy(),
        creado: serverTimestamp()
      });
    } catch(err){
      mostrarError(err);
    }
    btnPrueba.disabled = false;
  });

  // ============================================================
  // TICKETS PENDIENTES (en tiempo real)
  // ============================================================
  const listaPendientes    = document.getElementById("listaPendientes");
  const contadorPendientes = document.getElementById("contadorPendientes");

  // Modal de pendiente
  const modalPendiente = document.getElementById("modalPendiente");
  const pendBarbero    = document.getElementById("pendBarbero");
  const pendServicios  = document.getElementById("pendServicios");
  const pendMonto      = document.getElementById("pendMonto");
  const pendEfectivo   = document.getElementById("pendEfectivo");
  const pendTarjeta    = document.getElementById("pendTarjeta");
  const pendDescartar  = document.getElementById("pendDescartar");
  const pendCancelar   = document.getElementById("pendCancelar");
  const pendMsg        = document.getElementById("pendMsg");

  let pendienteAbierto = null;   // datos del ticket que se está cobrando
  let procesando = false;        // flag para evitar duplicados
  let confirmandoDescarte = false;

  function abrirModalPendiente(p){
    pendienteAbierto = p;
    procesando = false;
    confirmandoDescarte = false;
    pendBarbero.textContent = "Barbero " + p.barbero;
    pendServicios.textContent = Array.isArray(p.servicios) ? p.servicios.join(" + ") : String(p.servicios || "");
    pendMonto.value = p.monto;
    pendMsg.textContent = "";
    pendDescartar.textContent = "Descartar ticket";
    pendEfectivo.disabled = false;
    pendTarjeta.disabled = false;
    modalPendiente.classList.add("abierto");
  }

  function cerrarModalPendiente(){
    modalPendiente.classList.remove("abierto");
    pendienteAbierto = null;
  }

  pendCancelar.addEventListener("click", cerrarModalPendiente);

  // ----- Cobrar pendiente: batch atómico (guardar ticket + borrar pendiente) -----
  async function cobrarPendiente(metodo){
    if(procesando || !pendienteAbierto) return;

    const monto = parseFloat(pendMonto.value);
    if(isNaN(monto) || monto <= 0){
      pendMsg.style.color = "#e05c5c";
      pendMsg.textContent = "Escribe un monto válido";
      return;
    }

    procesando = true;
    pendEfectivo.disabled = true;
    pendTarjeta.disabled = true;
    pendMsg.style.color = "#9a9a9a";
    pendMsg.textContent = "Procesando...";

    try{
      const batch = writeBatch(db);

      // 1) Crear el ticket cobrado
      const nuevoTicket = doc(collection(db, "tickets"));
      batch.set(nuevoTicket, {
        barbero: pendienteAbierto.barbero,
        concepto: Array.isArray(pendienteAbierto.servicios)
                    ? pendienteAbierto.servicios.join(" + ")
                    : String(pendienteAbierto.servicios || "Ticket"),
        monto: monto,
        metodo: metodo,
        fecha: fechaHoy(),
        origen: "ticket",
        creado: serverTimestamp()
      });

      // 2) Borrar el pendiente
      batch.delete(doc(db, "pendientes", pendienteAbierto.id));

      // Todo o nada
      await batch.commit();
      cerrarModalPendiente();
    } catch(err){
      pendMsg.style.color = "#e05c5c";
      pendMsg.textContent = "Error: " + err.message;
      procesando = false;
      pendEfectivo.disabled = false;
      pendTarjeta.disabled = false;
    }
  }

  pendEfectivo.addEventListener("click", function(){ cobrarPendiente("efectivo"); });
  pendTarjeta.addEventListener("click", function(){ cobrarPendiente("tarjeta"); });

  // ----- Descartar pendiente (doble toque para confirmar) -----
  pendDescartar.addEventListener("click", async function(){
    if(procesando || !pendienteAbierto) return;

    if(!confirmandoDescarte){
      confirmandoDescarte = true;
      pendDescartar.textContent = "¿Seguro? Toca de nuevo para descartar";
      return;
    }

    procesando = true;
    try{
      const batch = writeBatch(db);
      batch.delete(doc(db, "pendientes", pendienteAbierto.id));
      await batch.commit();
      cerrarModalPendiente();
    } catch(err){
      pendMsg.style.color = "#e05c5c";
      pendMsg.textContent = "Error: " + err.message;
      procesando = false;
    }
  });

  // ----- Escuchar pendientes en tiempo real -----
  onSnapshot(collection(db, "pendientes"), function(snap){
    const pendientes = [];
    snap.forEach(function(d){
      pendientes.push({ id: d.id, ...d.data() });
    });

    // Más antiguos primero (orden de llegada)
    pendientes.sort(function(a, b){
      const ta = a.creado ? a.creado.toMillis() : Date.now();
      const tb = b.creado ? b.creado.toMillis() : Date.now();
      return ta - tb;
    });

    // Contador
    if(pendientes.length > 0){
      contadorPendientes.style.display = "inline-block";
      contadorPendientes.textContent = pendientes.length;
    } else {
      contadorPendientes.style.display = "none";
    }

    if(pendientes.length === 0){
      listaPendientes.innerHTML = '<div class="vacio">No hay tickets pendientes.</div>';
      return;
    }

    listaPendientes.innerHTML = "";
    pendientes.forEach(function(p){
      const tarjeta = document.createElement("div");
      tarjeta.className = "tarjetaPendiente";

      const info = document.createElement("div");
      info.className = "info";

      const nombre = document.createElement("div");
      nombre.className = "barbero";
      nombre.textContent = "Barbero " + p.barbero;

      const servicios = document.createElement("div");
      servicios.className = "servicios";
      servicios.textContent = Array.isArray(p.servicios) ? p.servicios.join(" + ") : String(p.servicios || "");

      const hora = document.createElement("div");
      hora.className = "hora";
      hora.textContent = formatoHora(p.creado);

      info.appendChild(nombre);
      info.appendChild(servicios);
      info.appendChild(hora);

      const derecha = document.createElement("div");
      derecha.style.display = "flex";
      derecha.style.flexDirection = "column";
      derecha.style.alignItems = "flex-end";
      derecha.style.gap = "8px";

      const monto = document.createElement("div");
      monto.className = "monto";
      monto.textContent = formatoDinero(p.monto);

      const btnCobrar = document.createElement("button");
      btnCobrar.className = "btnCobrarPend";
      btnCobrar.textContent = "Cobrar";
      btnCobrar.addEventListener("click", function(){
        abrirModalPendiente(p);
      });

      derecha.appendChild(monto);
      derecha.appendChild(btnCobrar);

      tarjeta.appendChild(info);
      tarjeta.appendChild(derecha);
      listaPendientes.appendChild(tarjeta);
    });
  }, function(err){
    mostrarError(err);
  });

  // ============================================================
  // COBROS DE HOY (en tiempo real, igual que la capa anterior)
  // ============================================================
  const listaCobros = document.getElementById("listaCobros");
  const totalDia    = document.getElementById("totalDia");

  const consultaHoy = query(
    collection(db, "tickets"),
    where("fecha", "==", fechaHoy())
  );

  onSnapshot(consultaHoy, function(snap){
    const cobros = [];
    snap.forEach(function(d){
      cobros.push({ id: d.id, ...d.data() });
    });

    cobros.sort(function(a, b){
      const ta = a.creado ? a.creado.toMillis() : Date.now();
      const tb = b.creado ? b.creado.toMillis() : Date.now();
      return tb - ta;
    });

    let total = 0;
    cobros.forEach(function(c){ total += c.monto; });
    totalDia.textContent = formatoDinero(total);

    if(cobros.length === 0){
      listaCobros.innerHTML = '<div class="vacio">Aún no hay cobros registrados hoy.</div>';
      return;
    }

    listaCobros.innerHTML = "";
    cobros.forEach(function(c){
      const tarjeta = document.createElement("div");
      tarjeta.className = "tarjetaCobro";

      const info = document.createElement("div");
      info.className = "info";

      const nombre = document.createElement("div");
      nombre.className = "barbero";
      nombre.textContent = "Barbero " + c.barbero;

      const concepto = document.createElement("div");
      concepto.className = "concepto";
      concepto.textContent = c.concepto;

      const hora = document.createElement("div");
      hora.className = "hora";
      hora.textContent = formatoHora(c.creado);

      const etiqueta = document.createElement("span");
      etiqueta.className = "etiqueta " + c.metodo;
      etiqueta.textContent = c.metodo === "tarjeta" ? "Tarjeta" : "Efectivo";

      info.appendChild(nombre);
      info.appendChild(concepto);
      info.appendChild(hora);
      info.appendChild(etiqueta);

      const monto = document.createElement("div");
      monto.className = "monto";
      monto.textContent = formatoDinero(c.monto);

      tarjeta.appendChild(info);
      tarjeta.appendChild(monto);
      listaCobros.appendChild(tarjeta);
    });
  }, function(err){
    mostrarError(err);
  });
</script>

<!-- ===== LOGIN Y SESIÓN ===== -->
<script>
  const PASS_CAJA = "peluqueriacochera1720";
  const CLAVE_SESION = "garageSesion";
  const DURACION_SESION = 5 * 60 * 60 * 1000; // 5 horas

  const pantallaLogin = document.getElementById("pantallaLogin");
  const pantallaCaja  = document.getElementById("pantallaCaja");
  const inputPass     = document.getElementById("inputPass");
  const btnEntrar     = document.getElementById("btnEntrar");
  const btnSalir      = document.getElementById("btnSalir");
  const msgLogin      = document.getElementById("msgLogin");

  function sesionValida(){
    const guardado = localStorage.getItem(CLAVE_SESION);
    if(!guardado) return false;
    const inicio = parseInt(guardado, 10);
    if(isNaN(inicio)) return false;
    return (Date.now() - inicio) < DURACION_SESION;
  }

  function mostrarCaja(){
    pantallaLogin.style.display = "none";
    pantallaCaja.style.display  = "block";
  }

  function mostrarLogin(){
    pantallaCaja.style.display  = "none";
    pantallaLogin.style.display = "flex";
    inputPass.value = "";
    msgLogin.textContent = "";
  }

  function intentarEntrar(){
    if(inputPass.value === PASS_CAJA){
      localStorage.setItem(CLAVE_SESION, Date.now().toString());
      mostrarCaja();
    } else {
      msgLogin.textContent = "Contraseña incorrecta";
      inputPass.value = "";
    }
  }

  btnEntrar.addEventListener("click", intentarEntrar);
  inputPass.addEventListener("keydown", function(e){
    if(e.key === "Enter") intentarEntrar();
  });

  btnSalir.addEventListener("click", function(){
    localStorage.removeItem(CLAVE_SESION);
    mostrarLogin();
  });

  if(sesionValida()){
    mostrarCaja();
  }
</script>
